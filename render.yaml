services:
  - type: web
    name: bakliwal-portal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: SECRET_KEY
        generateValue: true
      - key: SHEET_NAME
        value: StudentMarks
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false